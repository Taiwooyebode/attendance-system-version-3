{% extends 'base.html' %}
{% block title %}New Course — FaceAttend{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Create Course</h1>
    <p>Add a new course to your portfolio</p>
</div>

<div class="card" style="max-width: 480px;">
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Course Code</label>
            <input class="form-input" type="text" name="code" required placeholder="CMP 301" style="text-transform: uppercase;">
        </div>
        <div class="form-group">
            <label class="form-label">Course Title</label>
            <input class="form-input" type="text" name="title" required placeholder="Introduction to Algorithms">
        </div>
        <button type="submit" class="btn btn--gold btn--block mt-2">Create Course</button>
    </form>
</div>
{% endblock %}
